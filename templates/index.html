<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Prometheus Daily</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0e1013;
      --surface: #171a20;
      --surface-raised: #1d222a;
      --surface-soft: #242a33;
      --line: #313844;
      --text: #f1f5f9;
      --muted: #9aa5b5;
      --muted-strong: #c3cad6;
      --accent: #2dd4bf;
      --accent-strong: #14b8a6;
      --accent-ink: #06231f;
      --warm: #f59e0b;
      --success: #34d399;
      --danger: #f87171;
      --shadow: 0 24px 70px rgba(0, 0, 0, .34);
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 316px minmax(0, 1fr);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--bg);
      letter-spacing: 0;
    }

    button, input { font: inherit; letter-spacing: 0; }
    button { cursor: pointer; }
    button:disabled { cursor: not-allowed; }

    .sidebar {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--line);
      background: var(--surface);
    }

    .brand {
      padding: 24px 22px 18px;
      border-bottom: 1px solid var(--line);
    }

    .brand-name {
      margin: 0;
      font-size: 22px;
      line-height: 1.15;
      font-weight: 800;
      color: var(--text);
    }

    .brand-subtitle {
      margin-top: 7px;
      color: var(--muted);
      font-size: 13px;
    }

    .side-actions {
      display: flex;
      gap: 8px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }

    .icon-button,
    .primary-button {
      height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 1px solid transparent;
      border-radius: 8px;
      white-space: nowrap;
    }

    .primary-button {
      flex: 1;
      padding: 0 12px;
      color: var(--accent-ink);
      background: var(--accent);
    }

    .primary-button:hover { background: var(--accent-strong); }
    .primary-button:disabled {
      color: #d0d5dd;
      background: #475467;
    }

    .icon-button {
      width: 38px;
      color: var(--muted-strong);
      background: var(--surface-soft);
      border-color: var(--line);
    }

    .icon-button:hover {
      color: var(--text);
      background: #2b3440;
    }

    .icon {
      width: 17px;
      height: 17px;
      stroke-width: 2.2;
      flex: 0 0 auto;
    }

    .list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 18px 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .list-count {
      color: var(--muted-strong);
      font-weight: 600;
      text-transform: none;
    }

    .list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 12px 18px;
    }

    .item {
      width: 100%;
      min-height: 86px;
      margin-bottom: 8px;
      padding: 13px 14px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      color: inherit;
      text-align: left;
    }

    .item:hover {
      background: var(--surface-soft);
      border-color: var(--line);
    }

    .item.active {
      background: #122821;
      border-color: rgba(45, 212, 191, .45);
    }

    .date {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-weight: 800;
      color: var(--text);
    }

    .date-badge {
      flex: 0 0 auto;
      color: var(--accent);
      font-size: 11px;
      font-weight: 700;
      background: rgba(45, 212, 191, .14);
      border: 1px solid rgba(45, 212, 191, .26);
      border-radius: 999px;
      padding: 3px 7px;
    }

    .summary {
      margin-top: 7px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .workspace {
      min-width: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 28px;
      border-bottom: 1px solid var(--line);
      background: rgba(14, 16, 19, .86);
      backdrop-filter: blur(14px);
    }

    .current-title {
      min-width: 0;
      font-weight: 800;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: max-content;
      color: var(--muted-strong);
      font-size: 13px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 0 4px rgba(52, 211, 153, .13);
    }

    .status.running .status-dot {
      background: var(--warm);
      box-shadow: 0 0 0 4px rgba(245, 158, 11, .14);
    }

    main {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 34px 28px 48px;
    }

    .reader {
      max-width: 920px;
      margin: 0 auto;
      padding: 42px 48px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .report-meta {
      display: grid;
      gap: 14px;
      margin-bottom: 24px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
    }

    .report-meta-top {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
    }

    .report-meta-label {
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .report-meta-date {
      color: var(--muted-strong);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .report-meta-summary {
      margin: 0;
      color: var(--muted-strong);
      font-size: 14px;
      line-height: 1.76;
    }

    .report-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .report-tag {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      border: 1px solid rgba(45, 212, 191, .20);
      border-radius: 999px;
      color: var(--accent);
      background: rgba(45, 212, 191, .08);
      font-size: 12px;
      font-weight: 600;
    }

    .reader h1,
    .reader h2,
    .reader h3 {
      color: var(--text);
      line-height: 1.28;
    }

    .reader h1 { font-size: 28px; margin: 0 0 20px; }
    .reader h2 { font-size: 21px; margin-top: 30px; }
    .reader h3 { font-size: 18px; margin-top: 26px; }
    .reader p,
    .reader li {
      color: #d9e2ec;
      font-size: 15px;
      line-height: 1.82;
    }

    .reader ol,
    .reader ul {
      padding-left: 24px;
    }

    .reader li + li {
      margin-top: 12px;
    }

    .reader a {
      color: var(--accent);
      text-decoration-thickness: 1px;
      text-underline-offset: 3px;
    }

    .reader code {
      border-radius: 5px;
      padding: 2px 5px;
      background: #11161d;
      color: #b7f7ed;
      font-size: .92em;
    }

    .empty-state {
      min-height: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: var(--muted);
    }

    .empty-state .icon {
      width: 34px;
      height: 34px;
      color: #778396;
      margin-bottom: 12px;
    }

    .toast {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 10;
      max-width: min(420px, calc(100vw - 36px));
      padding: 11px 14px;
      border-radius: 8px;
      color: var(--accent-ink);
      background: var(--accent);
      box-shadow: 0 18px 44px rgba(0, 0, 0, .34);
      opacity: 0;
      transform: translateY(-6px);
      pointer-events: none;
      transition: opacity .18s ease, transform .18s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.error {
      color: #fff;
      background: #b91c1c;
    }

    .toast.success {
      color: #052e26;
      background: var(--success);
    }

    [hidden] { display: none !important; }

    @media (max-width: 860px) {
      body {
        grid-template-columns: 1fr;
      }

      .sidebar {
        min-height: 0;
        max-height: 42vh;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .brand {
        padding: 18px 18px 14px;
      }

      .brand-name {
        font-size: 20px;
      }

      .side-actions {
        padding: 12px 14px;
      }

      .workspace {
        min-height: 58vh;
      }

      .topbar {
        height: auto;
        min-height: 58px;
        padding: 12px 18px;
        align-items: flex-start;
        flex-direction: column;
      }

      main {
        padding: 18px 14px 28px;
      }

      .reader {
        padding: 26px 20px;
      }
    }
  </style>
</head>
<body>
  <aside class="sidebar">
    <header class="brand">
      <h1 class="brand-name">Prometheus Daily</h1>
      <div class="brand-subtitle">普罗米修斯日报</div>
    </header>
    {{if .Admin}}
    <div class="side-actions" id="adminTools">
      <button class="primary-button" id="generateBtn" type="button">
        <i class="icon" data-lucide="sparkles"></i>
        <span>生成今天</span>
      </button>
      <button class="icon-button" id="clearTokenBtn" type="button" title="清除令牌" aria-label="清除令牌">
        <i class="icon" data-lucide="lock-keyhole"></i>
      </button>
    </div>
    {{end}}
    <div class="list-header">
      <span>日报</span>
      <span class="list-count" id="listCount">0 篇</span>
    </div>
    <div class="list" id="dailyList"></div>
  </aside>
  <section class="workspace">
    <div class="topbar">
      <div class="current-title" id="currentTitle">选择一篇日报</div>
      <div class="status" id="statusBadge">
        <span class="status-dot"></span>
        <span id="statusText">就绪</span>
        <span id="statusTime"></span>
      </div>
    </div>
    <main>
      <article class="reader" id="content">
        <div class="empty-state">
          <i class="icon" data-lucide="newspaper"></i>
          <div>暂无选中的日报</div>
        </div>
      </article>
    </main>
  </section>
  <div class="toast" id="toast"></div>
  <script>
    let currentDate = "";

    function setupIcons() {
      if (window.lucide) window.lucide.createIcons();
    }

    async function loadList() {
      const res = await fetch("/api/daily");
      if (!res.ok) throw new Error("列表加载失败");
      const data = await res.json();
      const items = data.items || [];
      const list = document.getElementById("dailyList");
      list.replaceChildren();
      document.getElementById("listCount").textContent = `${items.length} 篇`;

      for (const item of items) {
        const row = document.createElement("button");
        row.type = "button";
        row.className = "item" + (item.date === currentDate ? " active" : "");
        row.addEventListener("click", () => loadDaily(item.date));

        const date = document.createElement("div");
        date.className = "date";

        const dateText = document.createElement("span");
        dateText.textContent = item.date;
        const badge = document.createElement("span");
        badge.className = "date-badge";
        badge.textContent = "日报";

        const summary = document.createElement("div");
        summary.className = "summary";
        summary.textContent = item.summary || "暂无摘要";

        date.append(dateText, badge);
        row.append(date, summary);
        list.appendChild(row);
      }

      if (!currentDate && items.length > 0) {
        await loadDaily(items[0].date);
      }
    }

    async function loadDaily(date) {
      currentDate = date;
      const res = await fetch(`/api/daily/${date}`);
      if (!res.ok) {
        showToast("加载失败", "error");
        return;
      }
      const data = await res.json();
      document.getElementById("currentTitle").textContent = `日报 ${data.date || date}`;
      renderDaily(data);
      await loadList();
    }

    function renderDaily(data) {
      const content = document.getElementById("content");
      const meta = document.createElement("section");
      meta.className = "report-meta";

      const metaTop = document.createElement("div");
      metaTop.className = "report-meta-top";

      const label = document.createElement("span");
      label.className = "report-meta-label";
      label.textContent = "元信息";

      const date = document.createElement("span");
      date.className = "report-meta-date";
      date.textContent = `报告日期 ${data.date || currentDate}`;

      const summary = document.createElement("p");
      summary.className = "report-meta-summary";
      summary.textContent = data.summary || "暂无摘要";

      const tags = document.createElement("div");
      tags.className = "report-tags";
      (data.tags || []).forEach((tag) => {
        const chip = document.createElement("span");
        chip.className = "report-tag";
        chip.textContent = tag;
        tags.appendChild(chip);
      });

      metaTop.append(label, date);
      meta.append(metaTop, summary, tags);

      const body = document.createElement("div");
      body.className = "report-body";
      body.innerHTML = DOMPurify.sanitize(marked.parse(data.body || ""));

      content.replaceChildren(meta, body);
    }

    {{if .Admin}}
    async function generateDaily() {
      const btn = document.getElementById("generateBtn");
      btn.disabled = true;
      try {
        let token = sessionStorage.getItem("adminToken");
        if (!token) {
          token = prompt("管理令牌");
          if (!token) return;
          sessionStorage.setItem("adminToken", token);
        }
        const res = await fetch("/api/generate", { method: "POST", headers: { Authorization: `Bearer ${token}` } });
        const data = await res.json();
        if (res.status === 401) sessionStorage.removeItem("adminToken");
        if (!res.ok || !data.success) throw new Error(data.error || "生成失败");
        showToast("生成完成", "success");
        currentDate = data.date;
        await loadList();
        await loadDaily(data.date);
      } catch (err) {
        showToast(err.message, "error");
      } finally {
        btn.disabled = false;
      }
    }

    function clearToken() {
      sessionStorage.removeItem("adminToken");
      showToast("令牌已清除", "success");
    }
    {{end}}

    async function loadStatus() {
      const res = await fetch("/api/status");
      if (!res.ok) return;
      const data = await res.json();
      const badge = document.getElementById("statusBadge");
      badge.classList.toggle("running", Boolean(data.running));
      document.getElementById("statusText").textContent = data.running ? "生成中" : "就绪";
      document.getElementById("statusTime").textContent = data.last_run ? new Date(data.last_run).toLocaleString("zh-CN") : "";
    }

    function showToast(message, type) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.className = `toast show ${type || ""}`;
      setTimeout(() => { toast.className = "toast"; }, 3000);
    }

    setupIcons();
    {{if .Admin}}
    document.getElementById("generateBtn").addEventListener("click", generateDaily);
    document.getElementById("clearTokenBtn").addEventListener("click", clearToken);
    {{end}}
    loadList().catch((err) => showToast(err.message, "error"));
    loadStatus().catch(() => {});
  </script>
</body>
</html>
